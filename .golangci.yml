run:
  timeout: 5m
  issues-exit-code: 1
  tests: true

linters:
  disable-all: true
  enable:
    - stylecheck
    - goimports
    - misspell
    - revive
    - gofmt
    - gosec
    - exhaustive
    - nilerr
    - wrapcheck
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused

linters-settings:

  exhaustive:
    # Check switch statements for exhaustiveness
    default-signifies-exhaustive: true
  wrapcheck:
    # Wrapcheck checks that errors returned from external packages are wrapped.
    # We should configure it to ignore internal packages if they are not external.
    # By default it checks errors from outside the package.
    ignorePackageGlobs:
      - "github.com/GoogleCloudPlatform/key-protection-module/*"

issues:
  exclude-use-default: false
  max-same-issues: 0
  max-issues-per-linter: 0
