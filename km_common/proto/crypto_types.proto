syntax = "proto3";

package keymanager;

import "km_common/proto/algorithms.proto";

option go_package = "github.com/GoogleCloudPlatform/key-protection-module/km_common/proto;keymanager";

// Used to refer to key instances held by the service.
message KeyHandle {
  // A unique identifier (UUID) used to reference this key in subsequent operations.
  string handle = 1;
}

// Information about a public key.
message PubKeyInfo {
  // The algorithm associated with this public key.
  AlgorithmDetails algorithm = 1;
  // The base64-encoded bytes of the public key.
  bytes public_key = 2;
}
