name: CI
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }}, ${{ matrix.arch }}, Go ${{ matrix.go-version }})
    strategy:
      matrix:
        go-version: ["1.24.x"]
        os: [ubuntu-latest, macos-latest]
        arch: [amd64, arm64]
        exclude:
          - os: macos-latest
            arch: amd64
          - os: ubuntu-latest
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Setup Rust
        if: matrix.os == 'ubuntu-latest' && matrix.arch == 'amd64'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - name: Install Build Dependencies
        if: matrix.os == 'ubuntu-latest' && matrix.arch == 'amd64'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang pkg-config libssl-dev protobuf-compiler

      - name: Install cbindgen
        if: matrix.os == 'ubuntu-latest' && matrix.arch == 'amd64'
        run: cargo install --locked --version 0.29.2 cbindgen

      - name: Install bindgen-cli
        if: matrix.os == 'ubuntu-latest' && matrix.arch == 'amd64'
        run: cargo install --locked --version 0.72.1 bindgen-cli

      - name: Install protoc plugins
        if: matrix.os == 'ubuntu-latest' && matrix.arch == 'amd64'
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Check Protobuf Generation
        if: matrix.os == 'ubuntu-latest' && matrix.arch == 'amd64'
        run: |
          ./gen_keymanager.sh
          git diff -G'^[^/]' --exit-code km_common/proto/ workload_service/proto/

      - name: Check FFI Header Generation
        if: matrix.os == 'ubuntu-latest' && matrix.arch == 'amd64'
        run: |
          ./generate_ffi_headers.sh
          git diff -G'^[^/]' --exit-code workload_service/key_custody_core/include/ key_protection_service/key_custody_core/include/

      - name: Build and Test Rust
        if: matrix.os == 'ubuntu-latest' && matrix.arch == 'amd64'
        run: |
          cargo build --verbose
          cargo test --verbose --workspace

      - name: Build and Test Go
        env:
          GOOS: ${{ (matrix.os == 'macos-latest' && 'darwin') || 'linux' }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: ${{ (matrix.os == 'ubuntu-latest' && matrix.arch == 'amd64') && '1' || '0' }}
        run: |
          go build -v ./...
          if [ "${{ matrix.os }}" == "ubuntu-latest" ] && [ "${{ matrix.arch }}" == "amd64" ]; then
            # Full test suite on primary platform
            go test -v -race ./...
            go test -v -race -tags integration ./...
            
            # Verify stubs on primary platform by forcing CGO off
            echo "Verifying stubs (CGO_ENABLED=0)..."
            CGO_ENABLED=0 go test -v ./workload_service/key_custody_core/... ./key_protection_service/key_custody_core/...
          else
            # Only run stub tests on other platforms to avoid socket path limits
            echo "Running stub tests only..."
            go test -v ./workload_service/key_custody_core/... ./key_protection_service/key_custody_core/...
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: "1.24.x"
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
          targets: x86_64-unknown-linux-gnu

      - name: Install Nightly Rustfmt
        run: rustup toolchain install nightly --component rustfmt

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang pkg-config libssl-dev

      - name: Install cbindgen
        run: cargo install --locked --version 0.29.2 cbindgen

      - name: Install bindgen-cli
        run: cargo install --locked --version 0.72.1 bindgen-cli

      - name: Generate FFI Headers
        run: ./generate_ffi_headers.sh

      - name: Build Rust Libraries
        run: cargo build --workspace

      - name: Rust Format Check
        run: cargo +nightly fmt --all -- --check

      - name: Rust Clippy
        run: cargo clippy --workspace --exclude bssl-crypto --exclude bssl-sys --no-deps -- -D warnings

      - name: Golangci-lint
        uses: golangci/golangci-lint-action@ec5d18412c0aeab7936cb16880d708ba2a64e1ae # v6.2.0
        with:
          version: v1.64.8
          args: >
            -E stylecheck
            -E goimports
            -E misspell
            -E revive
            -E gofmt
            --exclude-use-default=false
            --max-same-issues=0
            --max-issues-per-linter=0
            --timeout 2m

  lintc:
    name: Lint CGO
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: "1.24.x"
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang pkg-config libssl-dev

      - name: Install cbindgen
        run: cargo install --locked --version 0.29.2 cbindgen

      - name: Install bindgen-cli
        run: cargo install --locked --version 0.72.1 bindgen-cli

      - name: Generate FFI Headers
        run: ./generate_ffi_headers.sh

      - name: Build Rust Libraries
        run: cargo build --workspace

      - name: Check for CGO Warnings (gcc)
        run: CGO_CFLAGS=-Werror CC=gcc go build ./...

      - name: Check for CGO Warnings (clang)
        run: CGO_CFLAGS=-Werror CC=clang go build ./...

  buf:
    name: Buf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive

      - uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1.4.0
        with:
          lint: true
          pr_comment: false
          breaking: ${{ github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'buf skip breaking') }}
          breaking_against: "https://github.com/${{ github.repository }}.git#branch=main"
          exclude_paths: |
            keymanager/attestation_service/proto
