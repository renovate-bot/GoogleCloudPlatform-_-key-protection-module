name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      refToBuild:
        description: 'Branch, tag or commit SHA1 to build'
        required: false
        type: string

permissions:
  contents: read

jobs:
  release:
    permissions:
      contents: write
      id-token: write
    strategy:
      matrix:
        go-version: [1.24.x]
        os: [ubuntu-latest]

    name: Release (${{ matrix.os}}, Go ${{ matrix.go-version }})
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          ref: ${{ inputs.refToBuild }}
          submodules: recursive
      
      - name: Setup Go
        uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
      
      - shell: bash
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
      
      - name: Install Linux packages
        run: sudo apt-get update && sudo apt-get -y install libssl-dev cmake clang pkg-config
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      
      - name: Install bindgen-cli
        run: cargo install --locked --version 0.72.1 bindgen-cli
      
      - name: Install cbindgen
        run: cargo install --locked --version 0.29.2 cbindgen

      - name: Generate FFI Headers
        run: ./generate_ffi_headers.sh

      - name: Build Rust components
        run: cargo build --release

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@90a3faa9d0182683851fbfa97ca1a2cb983bfca3 # v6.2.1
        if: success() && (startsWith(github.ref, 'refs/tags/v') || startsWith(inputs.refToBuild, 'v'))
        with:
          version: v2.7.0
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
